<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quantbrowse AI</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          sans-serif;
        width: 380px;
        min-height: 200px;
        background: #0f0f13;
        color: #e8e8f0;
      }

      .header {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 14px 16px 12px;
        border-bottom: 1px solid #1e1e2e;
        background: #13131a;
      }

      .logo {
        width: 28px;
        height: 28px;
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 15px;
        flex-shrink: 0;
      }

      .header h1 {
        font-size: 14px;
        font-weight: 600;
        color: #c4c4d4;
        letter-spacing: 0.3px;
      }

      .section {
        padding: 14px 16px 6px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .section-title {
        font-size: 11px;
        letter-spacing: 0.3px;
        text-transform: uppercase;
        color: #7c7c9c;
      }

      .quick-actions {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 8px;
      }

      .action-btn {
        background: #1a1a24;
        border: 1px solid #2a2a3c;
        border-radius: 10px;
        padding: 10px 8px;
        color: #e8e8f0;
        font-size: 12px;
        cursor: pointer;
        transition: border-color 0.15s, transform 0.15s;
      }

      .action-btn:hover {
        border-color: #6366f1;
        transform: translateY(-1px);
      }

      .action-btn.primary {
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        border: none;
        color: #fff;
        font-weight: 600;
      }

      .queue-card {
        background: #1a1a24;
        border: 1px solid #2a2a3c;
        border-radius: 12px;
        padding: 10px 12px;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .queue-row {
        display: flex;
        justify-content: space-between;
        font-size: 12px;
        color: #c4c4d4;
      }

      .queue-meta {
        font-size: 11px;
        color: #7c7c9c;
      }

      .queue-actions {
        display: flex;
        gap: 8px;
      }

      .queue-actions button {
        flex: 1;
        padding: 6px 8px;
        border-radius: 8px;
        border: 1px solid #2a2a3c;
        background: #151520;
        color: #d4d4e8;
        font-size: 11px;
        cursor: pointer;
      }

      textarea {
        width: 100%;
        background: #1a1a24;
        border: 1px solid #2a2a3c;
        border-radius: 10px;
        color: #e8e8f0;
        font-family: inherit;
        font-size: 13px;
        line-height: 1.5;
        padding: 10px 12px;
        resize: none;
        height: 72px;
        outline: none;
        transition: border-color 0.15s;
      }

      textarea::placeholder {
        color: #4a4a6a;
      }

      textarea:focus {
        border-color: #6366f1;
      }

      button#runBtn {
        width: 100%;
        padding: 10px;
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        border: none;
        border-radius: 10px;
        color: #fff;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: opacity 0.15s;
        letter-spacing: 0.2px;
      }

      button#runBtn:hover:not(:disabled) {
        opacity: 0.9;
      }

      button#runBtn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      #status {
        display: none;
        align-items: center;
        gap: 8px;
        padding: 0 16px 6px;
        font-size: 12px;
        color: #7c7c9c;
      }

      #status.visible {
        display: flex;
      }

      .spinner {
        width: 14px;
        height: 14px;
        border: 2px solid #2a2a3c;
        border-top-color: #6366f1;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        flex-shrink: 0;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      #result {
        display: none;
        margin: 0 16px 14px;
        background: #1a1a24;
        border: 1px solid #2a2a3c;
        border-radius: 10px;
        padding: 12px 14px;
        font-size: 13px;
        line-height: 1.65;
        color: #d4d4e8;
        max-height: 280px;
        overflow-y: auto;
        white-space: pre-wrap;
        word-break: break-word;
      }

      #result.visible {
        display: block;
      }

      #result.error {
        color: #f87171;
        border-color: #3d1a1a;
        background: #1c1010;
      }

      #swarm-stats {
        display: flex;
        gap: 6px;
        padding: 0 16px 10px;
        flex-wrap: wrap;
      }

      .stat-pill {
        display: flex;
        align-items: center;
        gap: 4px;
        background: #1a1a24;
        border: 1px solid #2a2a3c;
        border-radius: 20px;
        padding: 3px 9px;
        font-size: 11px;
        color: #7c7c9c;
        flex-shrink: 0;
      }

      .stat-pill .dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        flex-shrink: 0;
      }
      .dot-running {
        background: #6366f1;
        animation: pulse 1.4s ease-in-out infinite;
      }
      .dot-pending {
        background: #f59e0b;
      }
      .dot-complete {
        background: #22c55e;
      }
      .dot-failed {
        background: #f87171;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.4;
        }
      }

      #result::-webkit-scrollbar {
        width: 5px;
      }
      #result::-webkit-scrollbar-track {
        background: transparent;
      }
      #result::-webkit-scrollbar-thumb {
        background: #2a2a3c;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="logo">🤖</div>
      <h1>Quantbrowse AI</h1>
    </div>

    <div class="section">
      <div class="section-title">Quick save</div>
      <div class="quick-actions">
        <button class="action-btn primary" id="savePageBtn">Save Page</button>
        <button class="action-btn" id="saveSelectionBtn">Save Selection</button>
        <button class="action-btn" id="openCollectionsBtn">Open Collections</button>
        <button class="action-btn" id="queueFlushBtn">Flush Queue</button>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Offline queue</div>
      <div class="queue-card">
        <div class="queue-row">
          <span>Queued clips</span>
          <strong id="queueCount">0</strong>
        </div>
        <div class="queue-row">
          <span>Last sync</span>
          <span id="queueLastSync" class="queue-meta">Never</span>
        </div>
        <div class="queue-row">
          <span>Failures</span>
          <span id="queueFailures" class="queue-meta">0</span>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">AI command</div>
      <textarea
        id="promptInput"
        placeholder="Ask anything about this page…&#10;e.g. &quot;Summarize this article&quot; or &quot;Extract all prices&quot;"
      ></textarea>
      <button id="runBtn">✦ Run AI Command</button>
    </div>

    <div id="status">
      <div class="spinner"></div>
      <span>Analyzing page…</span>
    </div>

    <div id="swarm-stats"></div>

    <div id="result"></div>

    <script src="popup.js"></script>
  </body>
</html>
