<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quantbrowse AI</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          sans-serif;
        width: 400px;
        min-height: 200px;
        background: #0f0f13;
        color: #e8e8f0;
      }

      /* ── Header ── */
      .header {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px 16px 10px;
        border-bottom: 1px solid #1e1e2e;
        background: #13131a;
      }

      .logo {
        width: 26px;
        height: 26px;
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        flex-shrink: 0;
      }

      .header h1 {
        font-size: 13px;
        font-weight: 600;
        color: #c4c4d4;
        letter-spacing: 0.3px;
        flex: 1;
      }

      /* ── Tab bar ── */
      .tab-bar {
        display: flex;
        background: #13131a;
        border-bottom: 1px solid #1e1e2e;
      }

      .tab-btn {
        flex: 1;
        background: transparent;
        border: none;
        border-bottom: 2px solid transparent;
        color: #5a5a7a;
        cursor: pointer;
        font-size: 11px;
        font-weight: 500;
        padding: 8px 4px;
        transition: color 0.15s, border-color 0.15s;
        letter-spacing: 0.2px;
      }

      .tab-btn:hover { color: #a0a0c0; }

      .tab-btn.active {
        color: #c4c4d4;
        border-bottom-color: #6366f1;
      }

      /* ── Tab panels ── */
      .tab-panel { display: none; }
      .tab-panel.active { display: block; }

      /* ── Input area ── */
      .input-area {
        padding: 14px 16px 10px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      textarea {
        width: 100%;
        background: #1a1a24;
        border: 1px solid #2a2a3c;
        border-radius: 10px;
        color: #e8e8f0;
        font-family: inherit;
        font-size: 13px;
        line-height: 1.5;
        padding: 10px 12px;
        resize: none;
        height: 72px;
        outline: none;
        transition: border-color 0.15s;
      }

      textarea::placeholder { color: #4a4a6a; }
      textarea:focus { border-color: #6366f1; }

      button#runBtn {
        width: 100%;
        padding: 10px;
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        border: none;
        border-radius: 10px;
        color: #fff;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: opacity 0.15s;
        letter-spacing: 0.2px;
      }

      button#runBtn:hover:not(:disabled) { opacity: 0.9; }
      button#runBtn:disabled { opacity: 0.5; cursor: not-allowed; }

      /* ── Quick-save button row ── */
      .quick-actions {
        display: flex;
        gap: 6px;
        padding: 0 16px 10px;
      }

      .quick-btn {
        flex: 1;
        background: #1a1a24;
        border: 1px solid #2a2a3c;
        border-radius: 8px;
        color: #8a8aa8;
        cursor: pointer;
        font-size: 10px;
        padding: 6px 4px;
        transition: border-color 0.15s, color 0.15s;
        text-align: center;
      }

      .quick-btn:hover { border-color: #6366f1; color: #c4c4d4; }

      /* ── Status / Loading ── */
      #status {
        display: none;
        align-items: center;
        gap: 8px;
        padding: 0 16px 6px;
        font-size: 12px;
        color: #7c7c9c;
      }

      #status.visible { display: flex; }

      .spinner {
        width: 14px;
        height: 14px;
        border: 2px solid #2a2a3c;
        border-top-color: #6366f1;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        flex-shrink: 0;
      }

      @keyframes spin { to { transform: rotate(360deg); } }

      /* ── Result area ── */
      #result {
        display: none;
        margin: 0 16px 14px;
        background: #1a1a24;
        border: 1px solid #2a2a3c;
        border-radius: 10px;
        padding: 12px 14px;
        font-size: 13px;
        line-height: 1.65;
        color: #d4d4e8;
        max-height: 260px;
        overflow-y: auto;
        white-space: pre-wrap;
        word-break: break-word;
      }

      #result.visible { display: block; }
      #result.error { color: #f87171; border-color: #3d1a1a; background: #1c1010; }

      /* ── Swarm Stats ── */
      #swarm-stats {
        display: flex;
        gap: 6px;
        padding: 0 16px 10px;
        flex-wrap: wrap;
      }

      .stat-pill {
        display: flex;
        align-items: center;
        gap: 4px;
        background: #1a1a24;
        border: 1px solid #2a2a3c;
        border-radius: 20px;
        padding: 3px 9px;
        font-size: 11px;
        color: #7c7c9c;
        flex-shrink: 0;
      }

      .stat-pill .dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        flex-shrink: 0;
      }
      .dot-running { background: #6366f1; animation: pulse 1.4s ease-in-out infinite; }
      .dot-pending { background: #f59e0b; }
      .dot-complete { background: #22c55e; }
      .dot-failed { background: #f87171; }

      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.4; }
      }

      /* ── Collections panel ── */
      #collections-panel {
        height: 460px;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }

      #collections-root {
        flex: 1;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }

      /* ── Scrollbar ── */
      #result::-webkit-scrollbar { width: 5px; }
      #result::-webkit-scrollbar-track { background: transparent; }
      #result::-webkit-scrollbar-thumb { background: #2a2a3c; border-radius: 4px; }
    </style>
  </head>
  <body>
    <!-- ── Header ── -->
    <div class="header">
      <div class="logo">🤖</div>
      <h1>Quantbrowse AI</h1>
    </div>

    <!-- ── Tab bar ── -->
    <div class="tab-bar">
      <button class="tab-btn active" data-tab="ai">✦ AI</button>
      <button class="tab-btn" data-tab="collections">📁 Saves</button>
      <button class="tab-btn" data-tab="clip">✂ Clip</button>
    </div>

    <!-- ── AI tab ── -->
    <div id="tab-ai" class="tab-panel active">
      <div class="input-area">
        <textarea
          id="promptInput"
          placeholder="Ask anything about this page…&#10;e.g. &quot;Summarize this article&quot; or &quot;Extract all prices&quot;"
        ></textarea>
        <button id="runBtn">✦ Run AI Command</button>
      </div>

      <div id="status">
        <div class="spinner"></div>
        <span>Analyzing page…</span>
      </div>

      <div id="swarm-stats"></div>
      <div id="result"></div>
    </div>

    <!-- ── Collections tab ── -->
    <div id="tab-collections" class="tab-panel">
      <div id="collections-panel">
        <div id="collections-root"></div>
      </div>
    </div>

    <!-- ── Clip tab ── -->
    <div id="tab-clip" class="tab-panel">
      <div style="padding: 16px; display: flex; flex-direction: column; gap: 10px;">
        <p style="color: #7c7c9c; font-size: 12px; line-height: 1.6;">
          Save content from this page to your Quant library.
        </p>

        <div class="quick-actions">
          <button class="quick-btn" id="clipPageBtn">
            📄 Save Page
          </button>
          <button class="quick-btn" id="clipPickBtn">
            🎯 Pick Element
          </button>
          <button class="quick-btn" id="clipScreenBtn">
            📷 Screenshot
          </button>
        </div>

        <div id="clip-status" style="
          display: none;
          align-items: center;
          gap: 8px;
          font-size: 12px;
          color: #7c7c9c;
          padding: 4px 0;
        ">
          <div class="spinner"></div>
          <span id="clip-status-text">Saving…</span>
        </div>

        <div id="clip-result" style="
          display: none;
          background: #1a1a24;
          border: 1px solid #2a2a3c;
          border-radius: 8px;
          padding: 10px 12px;
          font-size: 12px;
          color: #d4d4e8;
          line-height: 1.5;
        "></div>

        <div style="
          border-top: 1px solid #1e1e2e;
          padding-top: 10px;
          color: #5a5a7a;
          font-size: 10px;
          line-height: 1.6;
        ">
          💡 Right-click any element on the page for more save options.<br>
          Shortcut: <kbd style="background:#1a1a24;border:1px solid #2a2a3c;border-radius:3px;padding:1px 4px">Alt+S</kbd> to save the current page instantly.
        </div>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
