<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuantBrowse AI</title>
  <style>
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      width: 350px;
      margin: 0;
      padding: 20px;
      background-color: #0d1117;
      color: #c9d1d9;
    }
    .header {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 10px;
      color: #58a6ff;
    }
    textarea {
      width: 100%;
      height: 80px;
      background-color: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #c9d1d9;
      padding: 10px;
      font-family: inherit;
      font-size: 14px;
      resize: none;
      box-sizing: border-box;
      margin-bottom: 15px;
    }
    textarea:focus {
      outline: none;
      border-color: #58a6ff;
      box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.3);
    }
    button {
      width: 100%;
      background-color: #238636;
      color: #ffffff;
      border: none;
      border-radius: 6px;
      padding: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    button:hover {
      background-color: #2ea043;
    }
    button:disabled {
      background-color: #1e4d29;
      cursor: not-allowed;
      color: #8b949e;
    }
    #status {
      margin-top: 15px;
      font-size: 12px;
      color: #8b949e;
      text-align: center;
      min-height: 15px;
    }
    .agent-thinking {
      color: #f2cc60 !important;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0% { opacity: 0.6; }
      50% { opacity: 1; }
      100% { opacity: 0.6; }
    }
  </style>
</head>
<body>
  <div class="header">
    QuantBrowse Core <span style="font-size: 12px; color: #8b949e; font-weight: normal;">| Agent Ready</span>
  </div>
  <textarea id="intentInput" placeholder="Command the AI Agent... (e.g., 'Click the login button' or 'Search for tech news')"></textarea>
  <button id="executeBtn">Execute Intent</button>
  <div id="status">Waiting for command...</div>
  <script src="popup.js"></script>
</body>
</html>
