<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Command Center</title>
  <style>
    body {
      margin: 0; padding: 0; font-family: 'Inter', system-ui, sans-serif;
      background-color: #0d1117; color: #c9d1d9;
      display: flex; flex-direction: column; height: 100vh;
    }
    .header {
      padding: 20px; border-bottom: 1px solid #30363d; display: flex; align-items: center; justify-content: space-between;
    }
    .header h1 { margin: 0; font-size: 18px; color: #58a6ff; }
    .status { font-size: 12px; color: #3fb950; display: flex; align-items: center; gap: 5px; }
    .status-dot { width: 8px; height: 8px; background-color: #3fb950; border-radius: 50%; box-shadow: 0 0 8px #3fb950; }
    
    .chat-container {
      flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px;
    }
    
    .message { max-width: 85%; padding: 12px 16px; border-radius: 8px; font-size: 14px; line-height: 1.4; word-wrap: break-word; }
    .message.user { align-self: flex-end; background-color: #1f6feb; color: white; border-bottom-right-radius: 2px;}
    .message.agent { align-self: flex-start; background-color: #21262d; border: 1px solid #30363d; border-bottom-left-radius: 2px; }
    .message.system { align-self: center; font-family: monospace; font-size: 12px; color: #8b949e; background: none; border: none; padding: 4px; }
    
    .input-area {
      padding: 20px; border-top: 1px solid #30363d; background-color: #161b22;
      display: flex; gap: 10px;
    }
    input {
      flex: 1; background-color: #0d1117; color: white; border: 1px solid #30363d;
      padding: 12px 15px; border-radius: 6px; outline: none; transition: border-color 0.2s;
    }
    input:focus { border-color: #58a6ff; box-shadow: 0 0 0 2px rgba(88,166,255,0.2); }
    button {
      background-color: #238636; color: white; border: none; padding: 0 20px;
      border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s;
    }
    button:hover { background-color: #2ea043; }
    button:disabled { background-color: #21262d; color: #8b949e; cursor: not-allowed; }
    
    .thinking { color: #f2cc60; display: inline-block; animation: pulse 1s infinite alternate; }
    @keyframes pulse { from { opacity: 0.5; } to { opacity: 1; } }
  </style>
</head>
<body>
  <div class="header">
    <h1>QuantBrowse AIO Sandbox</h1>
    <div class="status"><div class="status-dot"></div> Agent Idle</div>
  </div>
  
  <div class="chat-container" id="chat">
    <div class="message agent">
      <strong>System Initialized.</strong><br>
      I am the autonomous desktop agent. Provide a high-level goal and I will execute it in the background using Playwright.
    </div>
  </div>

  <div class="input-area">
    <input type="text" id="userInput" placeholder="e.g., 'Go to Wikipedia and save the summary of Quantum Computing to a file'">
    <button id="sendBtn">Execute</button>
  </div>

  <script src="app.js"></script>
</body>
</html>
